name: near_vibe
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  # sdk: ^3.12.0
  sdk: ">=3.10.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  provider: ^6.1.5+1
  image_picker: ^1.2.2
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  flutter_spinkit: ^5.2.2
  cloud_firestore: ^6.5.0
  location: ^8.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  avatar_plus: ^0.0.5
  shared_preferences: ^2.5.5
  firebase_storage: ^13.4.2
  cloudinary_api: ^1.1.1
  cloudinary_url_gen: ^1.8.0
  crypto: ^3.0.7
  geoflutterfire_plus: ^0.0.34

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon/app_icon_1024.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/app_icon/app_icon_1024.png"
  windows:
    generate: true
    image_path: "assets/app_icon/app_icon_1024.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/app_icon/app_icon_1024.png"

flutter:


  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/app_icon/


  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
